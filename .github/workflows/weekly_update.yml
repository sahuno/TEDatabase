name: Weekly LINE-1 Database Update

on:
  schedule:
    - cron: '0 3 * * 1'   # Every Monday 03:00 UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write
  issues: write

jobs:
  update-database:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Stage 1 — PubMed search
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python pipeline/01_pubmed_search.py --log_dir logs

      - name: Stage 2 — Download papers
        run: python pipeline/02_paper_fetch.py --log_dir logs

      - name: Stage 3 — LLM extraction
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/03_llm_extract.py --log_dir logs

      - name: Stage 4 — Liftover
        run: python pipeline/04_liftover.py --log_dir logs

      - name: Stage 5 — Dedup and merge
        run: python pipeline/05_dedup_merge.py --log_dir logs

      - name: Stage 6 — Build site data
        run: python pipeline/06_build_site_data.py --log_dir logs

      - name: Validate output
        run: bash scripts/validate_data.sh

      - name: Commit and push updates
        run: |
          git config user.name "L1-Bot"
          git config user.email "ekwame001@gmail.com"
          git add data/processed/loci.json data/processed/loci.tsv data/processed/loci_hg38.bed
          git add data/processed/papers.json data/processed/run_log.jsonl
          git add data/raw/pmids_seen.txt data/raw/pmids_failed.txt
          git add site/data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          TOTAL=$(python -c "import json; d=json.loads(open('data/processed/run_log.jsonl').readlines()[-1]); print(d.get('loci_total',0))" 2>/dev/null || echo "?")
          NEW=$(python -c "import json; d=json.loads(open('data/processed/run_log.jsonl').readlines()[-1]); print(d.get('loci_new',0))" 2>/dev/null || echo "?")
          git commit -m "data: weekly update $(date -u +%Y-%m-%d) — ${TOTAL} total loci, ${NEW} new"
          git push

      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-run-${{ github.run_id }}
          path: |
            logs/
            data/raw/extractions/
          retention-days: 30

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline failure ${new Date().toISOString().split('T')[0]}`,
              body: `Weekly update failed.\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['pipeline-failure', 'bug']
            })
